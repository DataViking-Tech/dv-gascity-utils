# gascity-comms — cross-city Gas City communication tooling.
#
# Ships:
#   - gcx, the city-aware mail wrapper that:
#       - Routes <city>:<alias> sends and @<city> reads through each peer's gateway
#       - Stamps origin-city metadata on outgoing wisps so replies round-trip
#       - Auto-nudges the recipient on point-to-point sends (configurable)
#       - Falls through to plain `gc` for non-cross-city calls
#   - gc-rig-join, the shared-prefix rig adoption helper:
#       - Pre-stages .beads/ stub on a second city pointing at the shared dolt
#       - Pulls the canonical project_id via `gc dolt-state ensure-project-id`
#       - Runs `gc rig add --adopt --prefix <p>` so the second city joins instead
#         of forking a duplicate prefix database
#       See dv-gascity-utils/docs/shared-rig-prefix.md for the design.
#   - gc-fix-refinery-routing, the polecat done-sequence assignee fix:
#       - Patches the gastown system pack so polecats reassign work beads to
#         '<rig>/gastown.refinery' (the namedWorkReady-resolvable form),
#         not the short '<rig>/refinery' that leaves the on-demand refinery
#         slot dormant.
#   - gc-fix-merge-strategy, the polecat PR-protected branch fix:
#       - Patches the polecat submit-and-exit step to auto-detect branch
#         protection via `gh api repos/<r>/branches/<t>` and set
#         metadata.merge_strategy=mr when the target is protected.
#       - Honors metadata.merge_strategy if already set (e.g. via
#         `gc sling --merge mr`) and a per-rig override file
#         `<rig-root>/.gc-merge-strategy`.
#       See dv-gascity-utils/docs/rig-merge-strategy.md for the design.
#   - pr-ci-watch order: closes the PR-protected merge loop. Every 5 min it
#     polls open PRs linked to tracked beads (refinery mr-mode handoffs and
#     blocked-direct-merge beads with a manually opened PR) and reslings to
#     the rig's polecat pool on CI failure, marks merge_result on external
#     merge/close, and records ci_status on green. Never auto-merges.
#     See dv-gascity-utils/docs/diagnostic-runbook.md for the "PR autonomy"
#     section.
#   - gc-tune-refinery-loop, the refinery find-work latency tuner:
#       - Caps the refinery's idle-watch doubling at 60s (was 300s) so a
#         freshly-pushed polecat branch is consumed within a minute even
#         after long quiet periods.
#       - Adds a `gc session nudge` to the polecat done-sequence so polecats
#         actively wake the refinery instead of relying purely on the
#         events watch firing.
#       See dv-gascity-utils/docs/refinery-latency-tuning.md for the design.
#
# Per-host setup (after import is materialized):
#   1. Symlink the wrappers:
#        ln -sf {{ConfigDir}}/system/packs/gascity-comms/assets/scripts/gcx ~/.gc/bin/gcx
#        ln -sf {{ConfigDir}}/system/packs/gascity-comms/assets/scripts/gc-rig-join ~/.gc/bin/gc-rig-join
#        ln -sf {{ConfigDir}}/system/packs/gascity-comms/assets/scripts/gc-fix-refinery-routing ~/.gc/bin/gc-fix-refinery-routing
#        ln -sf {{ConfigDir}}/system/packs/gascity-comms/assets/scripts/gc-fix-merge-strategy ~/.gc/bin/gc-fix-merge-strategy
#        ln -sf {{ConfigDir}}/system/packs/gascity-comms/assets/scripts/gc-tune-refinery-loop ~/.gc/bin/gc-tune-refinery-loop
#   2. Initialize the per-host peer registry:
#        cp {{ConfigDir}}/system/packs/gascity-comms/assets/templates/peers.toml.template ~/.gc/peers.toml
#      then fill in url + token_file for each peer the host should reach.
#   3. Run `gc-fix-merge-strategy` once to install the auto-detect logic
#      into this host's gastown system pack.
#   4. Run `gc-tune-refinery-loop` once to bound refinery find-work latency
#      to ~60s on this host's gastown system pack.
#
# Tokens stay outside the pack (one per host, mode 0600 in ~/.gc/tokens/).
# peers.toml lives outside the pack (per-host registry, never shared).

[pack]
name = "gascity-comms"
schema = 2
