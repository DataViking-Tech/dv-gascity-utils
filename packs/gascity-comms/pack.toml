# gascity-comms — cross-city Gas City communication tooling.
#
# Ships:
#   - gcx, the city-aware mail wrapper that:
#       - Routes <city>:<alias> sends and @<city> reads through each peer's gateway
#       - Stamps origin-city metadata on outgoing wisps so replies round-trip
#       - Auto-nudges the recipient on point-to-point sends (configurable)
#       - Falls through to plain `gc` for non-cross-city calls
#   - gc-rig-join, the shared-prefix rig adoption helper:
#       - Pre-stages .beads/ stub on a second city pointing at the shared dolt
#       - Pulls the canonical project_id via `gc dolt-state ensure-project-id`
#       - Runs `gc rig add --adopt --prefix <p>` so the second city joins instead
#         of forking a duplicate prefix database
#       See dv-gascity-utils/docs/shared-rig-prefix.md for the design.
#
# Per-host setup (after import is materialized):
#   1. Symlink the wrappers:
#        ln -sf {{ConfigDir}}/system/packs/gascity-comms/assets/scripts/gcx ~/.gc/bin/gcx
#        ln -sf {{ConfigDir}}/system/packs/gascity-comms/assets/scripts/gc-rig-join ~/.gc/bin/gc-rig-join
#   2. Initialize the per-host peer registry:
#        cp {{ConfigDir}}/system/packs/gascity-comms/assets/templates/peers.toml.template ~/.gc/peers.toml
#      then fill in url + token_file for each peer the host should reach.
#
# Tokens stay outside the pack (one per host, mode 0600 in ~/.gc/tokens/).
# peers.toml lives outside the pack (per-host registry, never shared).

[pack]
name = "gascity-comms"
schema = 2
