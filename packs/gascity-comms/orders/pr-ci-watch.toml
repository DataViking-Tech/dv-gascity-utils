# pr-ci-watch — close the PR-protected merge loop.
#
# When the refinery's mr-mode opens a PR (or a polecat's direct-merge hits
# branch protection and a human opens the PR manually), GitHub CI runs but
# nothing autonomous reacts to it. This order polls open PRs linked to
# tracked beads and:
#
#   - On CI fail: reslings — reopens the bead, sets rejection metadata,
#     routes back to the rig's polecat pool with metadata.existing_pr so
#     the refinery reuses the same PR after the polecat resubmits.
#   - On mergeable=CONFLICTING (target moved under a long-lived PR):
#     reslings without waiting for CI — the polecat rebases and resolves.
#   - On CI pass + mergeable: attempts `gh pr merge --squash --delete-branch`.
#     Success records merge_result=merged_external on the next cycle's
#     MERGED-state pass. Failure (race with target movement, missing
#     required-reviewer/signed-commit rule, etc.) reslings as a merge
#     conflict so the polecat re-investigates rather than spinning.
#   - On PR merged externally: marks merge_result=merged_external and
#     records the merged sha; tracking stops.
#   - On PR closed without merge: marks merge_result=closed_without_merge;
#     tracking stops.
#
# Auto-merge is on by default. To preserve the older "humans merge"
# policy on a host-by-host basis, set PR_CI_WATCH_AUTO_MERGE=false in
# the order's environment. With auto-merge disabled, CI green still
# records ci_status=passed and the script returns without acting.
#
# Idempotent: each cycle reads bead state fresh; terminal merge_result
# values are skipped. Capped at 3 consecutive resling attempts (CI fail
# OR merge conflict OR auto-merge failure — all share the resling cap)
# before escalating to mayor (override via PR_CI_WATCH_MAX_RESLINGS).
#
# Requires per-host gh CLI auth on the host running this order. Tokens
# live in ~/.config/gh/, never in this pack.
#
# Detailed flow + recovery recipes: ../../docs/diagnostic-runbook.md (PR
# autonomy section).

[order]
description = "Watch PRs linked to tracked beads; resling on CI failure"
trigger = "cooldown"
interval = "5m"
exec = "$PACK_DIR/assets/scripts/pr-ci-watch.sh"
